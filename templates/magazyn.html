{% extends "base.html" %}

{% block content %}
<main id="app-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 hidden">
    {% include "components/products.html" %}
</main>

<div id="product-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
        <div class="flex justify-between items-center border-b pb-2 mb-4">
            <h3 class="text-lg font-semibold">Dodaj Nowy Produkt</h3>
            <button onclick="closeProductModal()" class="text-gray-400 hover:text-red-500 font-bold text-xl">&times;</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="newSku" placeholder="SKU (np. KAB-001)" class="w-full border p-2 rounded focus:ring focus:ring-blue-200">
            <input type="text" id="newName" placeholder="Nazwa produktu" class="w-full border p-2 rounded focus:ring focus:ring-blue-200">
            
            <div class="grid grid-cols-2 gap-2">
                <select id="newType" class="border p-2 rounded focus:ring focus:ring-blue-200">
                    <option value="PRODUKT">Produkt</option>
                    <option value="POLPRODUKT">Półprodukt</option>
                </select>
                <select id="newUnit" class="border p-2 rounded focus:ring focus:ring-blue-200">
                    <option value="szt.">szt.</option>
                    <option value="kg">kg</option>
                    <option value="mb">mb</option>
                    <option value="m2">m2</option>
                    <option value="opk.">opk.</option>
                </select>
            </div>
            
            <button onclick="createProduct()" class="w-full bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700 transition-colors">Dodaj do Bazy</button>
        </div>
    </div>
</div>

<div id="recipe-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
        <div class="flex justify-between items-center border-b pb-2 mb-4">
            <h3 class="text-lg font-semibold">Zdefiniuj Skład</h3>
            <button onclick="closeRecipeModal()" class="text-gray-400 hover:text-red-500 font-bold text-xl">&times;</button>
        </div>
        <p class="text-sm text-gray-600 mb-4">Produkt główny: <strong id="recipe-parent-name" class="text-blue-600"></strong></p>
        
        <input type="hidden" id="parentProductId">
        
        <div class="space-y-4">
            <div class="flex gap-2 items-end">
                <div class="flex-grow">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Półprodukt</label>
                    <select id="componentProductId" class="w-full border p-2 rounded focus:ring focus:ring-blue-200"></select>
                </div>
                <div class="w-24">
                    <label class="block text-xs font-medium text-gray-700 mb-1">Ilość</label>
                    <input type="number" id="compQuantity" placeholder="Szt." class="w-full border p-2 rounded focus:ring focus:ring-blue-200">
                </div>
                <button onclick="addRecipeItemToList()" type="button" class="bg-green-600 text-white font-bold p-2 mb-0.5 rounded hover:bg-green-700">+</button>
            </div>
            
            <div id="recipe-items-list" class="space-y-2 mt-4 text-sm border-t pt-4 min-h-[50px] max-h-[150px] overflow-y-auto"></div>

            <button onclick="saveRecipe()" class="w-full mt-4 bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700 transition-colors">Zapisz Recepturę</button>
        </div>
    </div>
</div>
{% endblock %}
