<div class="bg-white p-6 rounded-lg shadow-md h-fit">
    <h3 class="text-lg font-semibold border-b pb-2 mb-4">Dodaj nowy dokument</h3>
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Typ dokumentu</label>
            <select id="docType" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm">
                <option value="PZ">PZ - Przyjęcie Zewnętrzne (+)</option>
                <option value="PW">PW - Przyjęcie Wewnętrzne (+)</option>
                <option value="ZW">ZW - Zwrot Wewnętrzny (+)</option>
                <option value="WZ">WZ - Wydanie Zewnętrzne (-)</option>
                <option value="RW">RW - Rozchód Wewnętrzny (-)</option>
            </select>
        </div>
        
        <div class="flex gap-2 items-end">
            <div class="flex-grow">
                <label class="block text-sm font-medium text-gray-700">Produkt</label>
                <select id="productId" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm">
                    <option value="">-- Wybierz produkt --</option>
                </select>
            </div>
            <div class="w-24">
                <label class="block text-sm font-medium text-gray-700">Liczba</label>
                <input type="number" id="quantity" class="mt-1 block w-full rounded-md border-gray-300 border p-2 shadow-sm">
            </div>
            <button onclick="addDocumentItem()" type="button" class="bg-green-600 text-white font-bold p-2 mb-0.5 rounded hover:bg-green-700">+</button>
        </div>
        
        <div id="document-items-list" class="space-y-2 mt-2 text-sm border-t pt-2"></div>

        <button onclick="sendDocument()" class="w-full mt-4 bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
            Zapisz Dokument
        </button>
    </div>
</div>
